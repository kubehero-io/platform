---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubehero.kubehero.io
  resources:
  - budgetpolicies
  - ceilingpolicies
  - rightsizingpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubehero.kubehero.io
  resources:
  - budgetpolicies/finalizers
  - ceilingpolicies/finalizers
  - rightsizingpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - kubehero.kubehero.io
  resources:
  - budgetpolicies/status
  - ceilingpolicies/status
  - rightsizingpolicies/status
  verbs:
  - get
  - patch
  - update
