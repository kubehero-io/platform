{{- $fullname := include "kubehero.fullname" . }}
# Dev-mode secrets (only when embedded storage is true AND the user has
# not provided an external secret). Production installs MUST point at
# External Secrets Operator via values.secrets.externalSecrets.
{{- if and .Values.postgresql.embedded (not .Values.postgresql.external.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-postgres-credentials
  labels: {{- include "kubehero.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  # Dev-only placeholder — generated per-install.
  username: "kubehero"
  password: {{ randAlphaNum 24 | quote }}
  database: "kubehero"
{{- end }}
{{- if and .Values.clickhouse.embedded (not .Values.clickhouse.external.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-clickhouse-credentials
  labels: {{- include "kubehero.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  username: "kubehero"
  password: {{ randAlphaNum 24 | quote }}
{{- end }}
