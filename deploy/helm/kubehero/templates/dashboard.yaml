{{- if .Values.dashboard.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubehero.fullname" . }}-dashboard
  labels: {{- include "kubehero.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: {{ include "kubehero.fullname" . }}-dashboard
      {{- with (include "kubehero.priorityClassName" .) }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if gt (int .Values.dashboard.replicas) 1 }}
      affinity: {{- include "kubehero.antiAffinity" (dict "component" "dashboard") | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: {{ include "kubehero.image" (dict "root" . "image" .Values.dashboard.image) }}
          ports:
            - name: http
              containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubehero.fullname" . }}-dashboard
  labels: {{- include "kubehero.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: dashboard
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      name: http
{{- end }}
