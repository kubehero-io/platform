{{- if .Values.controlPlane.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubehero.fullname" . }}-control-plane
  labels: {{- include "kubehero.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "kubehero.fullname" . }}-control-plane
      {{- if and .Values.podSecurityContext (gt (len .Values.podSecurityContext) 0) }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if gt (int .Values.controlPlane.replicas) 1 }}
      affinity: {{- include "kubehero.antiAffinity" (dict "component" "control-plane") | nindent 8 }}
      {{- end }}
      {{- with (include "kubehero.priorityClassName" .) }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "kubehero.image" (dict "root" . "image" .Values.controlPlane.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--addr=:8080"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /readyz, port: http }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
          resources: {{- toYaml .Values.controlPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubehero.fullname" . }}-control-plane
  labels: {{- include "kubehero.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: control-plane
  ports:
    - port: {{ .Values.controlPlane.service.port }}
      targetPort: http
      name: http
{{- end }}
