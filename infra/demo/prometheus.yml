global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: kubehero-collector
    static_configs:
      - targets: ["collector:8081"]
    metrics_path: /metrics

  - job_name: kubehero-control-plane
    static_configs:
      - targets: ["control-plane:8080"]
    metrics_path: /metrics

  - job_name: kubehero-pricing-engine
    static_configs:
      - targets: ["pricing-engine:8082"]
    metrics_path: /metrics

rule_files:
  - /etc/prometheus/rules/*.yml
